[build]
  # Directory to publish (contains static files)
  publish = "graphify-out"

  # No build command needed - static HTML files
  command = ""

# Redirect root to graph.html
[[redirects]]
  from = "/"
  to = "/graph.html"
  status = 200

# Handle SPA-style routing - serve graph.html for all paths
[[redirects]]
  from = "/*"
  to = "/graph.html"
  status = 200

# Headers for better caching and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300"
